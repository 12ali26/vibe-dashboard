services:
  dashboard:
    build:
      context: .
    container_name: vibeide-dashboard
    environment:
      PORT: "3000"
      WORKSPACES_DIR: ${WORKSPACES_DIR:-/home/ubuntu/projects}
      CODE_SERVER_PORT: ${CODE_SERVER_PORT:-8080}
      CODE_SERVER_URL: ${CODE_SERVER_URL:-}
    ports:
      - "${DASHBOARD_HOST:-0.0.0.0}:${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ${HOST_WORKSPACES_DIR:-/home/ubuntu/projects}:${WORKSPACES_DIR:-/home/ubuntu/projects}
    restart: unless-stopped

  code-server:
    profiles:
      - bundled-ide
    image: codercom/code-server:latest
    container_name: vibeide-code-server
    user: "0:0"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:-change-me}
    command:
      - --bind-addr
      - 0.0.0.0:8080
      - --auth
      - password
      - /workspaces
    ports:
      - "${BUNDLED_CODE_SERVER_HOST:-0.0.0.0}:${BUNDLED_CODE_SERVER_PORT:-8080}:8080"
    volumes:
      - ./workspaces:/workspaces
      - ./config/code-server:/root/.config/code-server
    restart: unless-stopped
